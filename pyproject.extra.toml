# Appended verbatim to pyproject.toml after `tree-sitter generate` rewrites
# the file from its template (see `make generate-bindings`). Sections that
# the generator does not produce live here.

[tool.cibuildwheel]
build = "cp310-*"
build-frontend = "build"

# Ruff configuration. The Python bindings under `bindings/python/`, `setup.py`,
# and `pyproject.toml` are scaffolded by `tree-sitter generate` and must stay
# byte-identical to the generator's output, so they are excluded below.
# Hand-written Python (currently `utils/`) is linted and formatted normally.

[tool.ruff]
target-version = "py310"
line-length = 100
extend-exclude = [
  "bindings",
  "setup.py",
  "src",
  "docs",
  "node_modules",
  "build",
  "dist",
]

[tool.ruff.lint]
select = [
  "E",    # pycodestyle errors
  "W",    # pycodestyle warnings
  "F",    # pyflakes
  "I",    # isort
  "UP",   # pyupgrade
  "B",    # flake8-bugbear
  "C4",   # flake8-comprehensions
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
