# Ruff configuration.
#
# The Python bindings under `bindings/python/`, `setup.py`, and `pyproject.toml`
# are scaffolded by `tree-sitter generate` (see `.gitattributes` for the full
# list of generated files) and must stay byte-identical to the generator's
# output. They are excluded below so we don't reformat them.
#
# Hand-written Python (currently `utils/`) is linted and formatted normally.

target-version = "py310"
line-length = 100

extend-exclude = [
  "bindings",
  "setup.py",
  "src",
  "docs",
  "node_modules",
  "build",
  "dist",
]

[lint]
select = [
  "E",    # pycodestyle errors
  "W",    # pycodestyle warnings
  "F",    # pyflakes
  "I",    # isort
  "UP",   # pyupgrade
  "B",    # flake8-bugbear
  "C4",   # flake8-comprehensions
]

[format]
quote-style = "double"
indent-style = "space"
