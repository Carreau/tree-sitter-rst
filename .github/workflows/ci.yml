name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install linting tools
        run: sudo apt-get install -y clang-format clang-tidy cppcheck
      - name: Check formatting
        run: make lint-format
      - name: Run clang-tidy
        run: make lint-tidy
      - name: Run cppcheck
        run: make lint-cppcheck

  rust:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - name: Check formatting
        run: cargo fmt --check
      - name: Run Clippy
        run: cargo clippy -- -D warnings
      - name: Run tests
        run: cargo test

  python:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.10"
      - name: Install ruff
        run: pip install ruff
      - name: Check formatting
        run: make lint-python-format
      - name: Run ruff
        run: make lint-python-check

  generate:
    # Re-run `tree-sitter generate` and the pyproject.extra.toml merge, then
    # fail if any committed file would change. Keeps the autogenerated bindings
    # (see .gitattributes) in sync with grammar.js / tree-sitter.json, while
    # preserving hand-maintained sections like [tool.cibuildwheel].
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@eeb902ac2f1be576edc296309872cf476a209b7f # v2
      - name: Regenerate bindings
        run: make generate-bindings
      - name: Check for drift
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated files are out of date. Run 'make generate-bindings' locally and commit the result."
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@v2
      - name: Run tests
        uses: tree-sitter/parser-test-action@v2
        with:
          test-rust: true
          test-node: false
          test-python: true
          test-go: false
          test-swift: false
      - run: make parse-examples
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@v2
      - name: Run tests
        uses: tree-sitter/parser-test-action@v2
        with:
          test-rust: true
          test-node: false
          test-python: true
          test-go: false
          test-swift: false
  mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@v2
      - name: Run tests
        uses: tree-sitter/parser-test-action@v2
        with:
          test-rust: true
          test-node: false
          test-python: true
          test-go: false
          test-swift: false
