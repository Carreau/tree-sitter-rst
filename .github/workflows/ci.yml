name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install linting tools
        run: sudo apt-get install -y clang-format clang-tidy cppcheck
      - name: Check formatting
        run: make lint-format
      - name: Run clang-tidy
        run: make lint-tidy
      - name: Run cppcheck
        run: make lint-cppcheck

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@v2
      - name: Run tests
        uses: tree-sitter/parser-test-action@v2
        with:
          test-rust: true
          test-node: false
          test-python: true
          test-go: false
          test-swift: false
      - run: make parse-examples
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@v2
      - name: Run tests
        uses: tree-sitter/parser-test-action@v2
        with:
          test-rust: true
          test-node: false
          test-python: true
          test-go: false
          test-swift: false
  mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@v2
      - name: Run tests
        uses: tree-sitter/parser-test-action@v2
        with:
          test-rust: true
          test-node: false
          test-python: true
          test-go: false
          test-swift: false
